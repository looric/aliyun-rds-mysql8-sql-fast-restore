name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check
        run: python -m py_compile restore_sql_fast.py
      - name: Python 3.6 grammar compatibility check
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path
          source = Path('restore_sql_fast.py').read_text(encoding='utf-8')
          ast.parse(source, feature_version=(3, 6))
          PY
      - name: Unit tests
        run: python -m unittest discover -s tests -v
