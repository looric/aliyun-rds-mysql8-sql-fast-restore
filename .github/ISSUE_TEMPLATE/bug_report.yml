name: Bug report
about: Report a restore failure or unexpected behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Tool version
      placeholder: "python3 restore_sql_fast.py --version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Alibaba Cloud Linux release 3 / CentOS / ..."
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.6.8"
    validations:
      required: true
  - type: input
    id: mysql
    attributes:
      label: MySQL Server and Client version
      placeholder: "MySQL Server 8.0.x, mysql client 8.0.x"
    validations:
      required: true
  - type: dropdown
    id: layout
    attributes:
      label: Backup layout
      options:
        - flat single database
        - nested multi database
        - not sure
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Remove passwords, IPs, and real RDS backup URLs before posting.
      render: bash
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error log
      description: Include the first MySQL error, not only the final summary.
      render: text
    validations:
      required: true
  - type: textarea
    id: tree
    attributes:
      label: Directory tree
      description: A small sanitized tree is enough.
      render: text
    validations:
      required: false
