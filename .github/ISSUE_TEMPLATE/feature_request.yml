name: Feature request
about: Suggest an improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What behavior or option would you like to add?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: OS, MySQL version, backup layout, and any constraints.
    validations:
      required: false
